name: Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions: read-all

jobs:
  ci:
    # Reusable CI lives in 1set/meta — the single source of truth for every
    # Star* module's pipeline. Pinned to a commit SHA for supply-chain safety;
    # bump the pin when meta's workflow changes (Dependabot github-actions can
    # automate this).
    uses: 1set/meta/.github/workflows/go-ci.yml@1e4f3924873c5f98bb73e06d1c2aa18ada716e31
    with:
      go-floor: "1.20"
      doc-coverage: true
      doc-coverage-file: docs/API.md
      doc-coverage-config: true
      cov-min: 69
      footprint: true
      footprint-max-mb: 7
    secrets: inherit
